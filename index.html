<header class="app-header">

  <p id="app-subtitle">Philanthropy & External Relations Retreat 2026</p>
</header>

<div class="tab-bar" id="tab-bar"></div>

<main id="main-content"></main>

<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-hdr" id="modal-hdr">
      <div class="modal-abbr" id="modal-abbr"></div>
      <div class="modal-title-block">
        <div class="step-n" id="modal-step-n"></div>
        <div class="step-t" id="modal-step-t"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-row">
        <div class="modal-row-lbl">Owner</div>
        <div class="modal-row-val" id="modal-owner"></div>
      </div>
      <div class="modal-row">
        <div class="modal-row-lbl">Description</div>

      </div>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const ICONS = { teams: 'ti-users', vision: 'ti-bulb', continuity: 'ti-refresh' };
let currentFlow = 'teams';

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function init() {
  document.getElementById('app-title').textContent = APP_CONTENT.retreatTitle;
  document.getElementById('app-subtitle').textContent = APP_CONTENT.retreatSubtitle;
  document.title = APP_CONTENT.retreatTitle;

  const keys = Object.keys(APP_CONTENT.flowcharts);
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = keys.map(k =>
    `<button class="tab" data-flow="${k}" onclick="showFlow('${k}')">${escapeHTML(APP_CONTENT.flowcharts[k].label)}</button>`
  ).join('');

  const nav = document.getElementById('bottom-nav');
  nav.innerHTML = keys.map(k =>
    `<button class="nav-item" data-flow="${k}" onclick="showFlow('${k}')"><i class="ti ${ICONS[k] || 'ti-list'}"></i>${escapeHTML(APP_CONTENT.flowcharts[k].label)}</button>`
  ).join('');

  showFlow(keys[0]);
}

function renderFlow(key) {
  const f = APP_CONTENT.flowcharts[key];
  if (!f) return '';
  let html = `<div class="screen">
    <div class="flow-title">${escapeHTML(f.title)}</div>
    <div class="flow-subtitle">${escapeHTML(f.subtitle || '')}</div>
    ${f.tagline ? `<div class="flow-tagline">${escapeHTML(f.tagline)}</div>` : ''}`;

  if (key === 'teams') {
    const groups = {};
    f.steps.forEach((s, i) => {
      if (!groups[s.role]) groups[s.role] = [];
      groups[s.role].push({...s, _idx: i});
    });
    const order = ['frontline', 'admin', 'marketing', 'events'];
    const teamNames = { frontline: 'Frontline', admin: 'Administrative', marketing: 'Marketing', events: 'Events' };
    order.forEach(role => {
      if (!groups[role]) return;
      const items = groups[role];
      html += `<div class="team-divider ${role}">${escapeHTML(teamNames[role])} <span class="count">· ${items.length} responsibilit${items.length === 1 ? 'y' : 'ies'}</span></div>`;
      items.forEach(s => {
        html += stepRow(key, s, s._idx, false);
      });
    });
  } else {
    f.steps.forEach((s, i) => {
      html += stepRow(key, s, i, true);
    });
  }

  html += `</div>`;
  return html;
}

function stepRow(flowKey, s, idx, showNum) {
  return `<button class="flow-step" onclick="openModal('${flowKey}',${idx})">
    <div class="abbr-badge ${escapeHTML(s.role)}">${escapeHTML(s.abbr)}</div>
    <div class="step-body">
      <div class="step-title">${showNum ? `<span class="step-num-mini">${idx + 1}.</span>` : ''}${escapeHTML(s.title)}</div>
      <div class="step-owner">${escapeHTML(s.owner)}</div>
    </div>
    <i class="ti ti-chevron-right chev"></i>
  </button>`;
}

function showFlow(key) {
  currentFlow = key;
  document.getElementById('main-content').innerHTML = renderFlow(key);
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.flow === key));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.flow === key));
  window.scrollTo(0, 0);
}

function openModal(flowKey, idx) {
  const f = APP_CONTENT.flowcharts[flowKey];
  const s = f.steps[idx];
  const hdr = document.getElementById('modal-hdr');
  hdr.className = 'modal-hdr ' + s.role;
  document.getElementById('modal-abbr').textContent = s.abbr;
  document.getElementById('modal-step-n').textContent = flowKey === 'teams'
    ? f.label
    : `Step ${idx + 1} of ${f.steps.length}`;
  document.getElementById('modal-step-t').textContent = s.title;
  document.getElementById('modal-owner').textContent = s.owner;
  document.getElementById('modal-desc').textContent = s.description || '—';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target.id === 'modal') closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>

</body>
</html>
